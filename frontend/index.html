<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NavAssist</title>
    <meta name="description" content="NavAssist - Navigation Assistant">
    <meta name="author" content="NavAssist" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NavAssist">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- OG Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NavAssist">
    <meta property="og:description" content="NavAssist - Navigation Assistant">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NavAssist">
    <meta name="twitter:description" content="NavAssist - Navigation Assistant">

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
